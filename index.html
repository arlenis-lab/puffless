<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- GitHub Pages SPA redirect: restore route saved by 404.html -->
    <script>
      const redirect = sessionStorage.getItem('redirect')
      if (redirect) {
        sessionStorage.removeItem('redirect')
        window.history.replaceState(null, null, redirect)
      }
    </script>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover for iPhone X+ notch / home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0e13" />
    <meta name="description" content="Your smoke-free journey tracker" />
    <!-- Apple PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Puffless" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Puffless</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
